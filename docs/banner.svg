<svg viewBox="0 0 1280 640" width="1280" height="640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="agent-wiki — A Knowledge-Assetization OS for AI agents">
  <defs>
    <!-- ===== base + ambience (radial-gradient fills, no filters: sanitizer-safe) ===== -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0%"   stop-color="#0a0b10"/>
      <stop offset="52%"  stop-color="#0d0f15"/>
      <stop offset="100%" stop-color="#111318"/>
    </linearGradient>
    <radialGradient id="glowAzure" cx="1170" cy="70" r="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5b8cff" stop-opacity="0.30"/>
      <stop offset="35%"  stop-color="#6fe9ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="1000" cy="560" r="470" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6fe9ff" stop-opacity="0.10"/>
      <stop offset="55%"  stop-color="#6fe9ff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#6fe9ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="640" cy="269" r="770" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="58%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.42"/>
    </radialGradient>
    <radialGradient id="glowWiki" cx="530" cy="235" r="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5b8cff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== wordmark gradients (vertical) ===== -->
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d6e2f5"/>
    </linearGradient>
    <linearGradient id="wikiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8af0ff"/>
      <stop offset="100%" stop-color="#5b8cff"/>
    </linearGradient>

    <!-- ===== eyebrow accents ===== -->
    <linearGradient id="ruleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5b8cff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#6fe9ff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#6fe9ff" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== chip surface ===== -->
    <linearGradient id="chipFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.045"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.015"/>
    </linearGradient>

    <!-- ===== knowledge-graph + gear motif ===== -->
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#aef2ff" stop-opacity="0.95"/>
      <stop offset="55%"  stop-color="#6fe9ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#6fe9ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="gearHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#5b8cff" stop-opacity="0.16"/>
      <stop offset="70%"  stop-color="#5b8cff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ============ background layers ============ -->
  <rect x="0" y="0" width="1280" height="640" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1280" height="640" fill="url(#glowAzure)"/>
  <rect x="0" y="0" width="1280" height="640" fill="url(#glowCyan)"/>
  <rect x="0" y="0" width="1280" height="640" fill="url(#vignette)"/>
  <line x1="0" y1="0.75" x2="1280" y2="0.75" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1.5"/>

  <!-- ============ motif (right): graph nodes/edges woven through a process gear ============ -->
  <g aria-hidden="true">
    <!-- process gear silhouette (manufacturing) -->
    <g transform="translate(1042 312)">
      <circle r="220" fill="url(#gearHalo)"/>
      <circle r="176" fill="none" stroke="#6fe9ff" stroke-opacity="0.13" stroke-width="20" stroke-dasharray="22 24" stroke-linecap="butt"/>
      <circle r="176" fill="none" stroke="#9fd4ff" stroke-opacity="0.10" stroke-width="1.2"/>
      <circle r="132" fill="none" stroke="#9fd4ff" stroke-opacity="0.16" stroke-width="1.2" stroke-dasharray="2 12"/>
      <circle r="74"  fill="none" stroke="#9fd4ff" stroke-opacity="0.16" stroke-width="1.2"/>
      <circle r="6"   fill="#6fe9ff" fill-opacity="0.5"/>
    </g>

    <!-- knowledge graph: edges (under nodes) -->
    <g stroke="url(#edge)" stroke-width="1.4">
      <line x1="930"  y1="178" x2="1058" y2="150"/>
      <line x1="1058" y1="150" x2="1168" y2="232"/>
      <line x1="930"  y1="178" x2="1012" y2="300"/>
      <line x1="1012" y1="300" x2="1058" y2="150"/>
      <line x1="1012" y1="300" x2="1168" y2="232"/>
      <line x1="1012" y1="300" x2="1110" y2="392"/>
      <line x1="1012" y1="300" x2="912"  y2="356"/>
      <line x1="1012" y1="300" x2="996"  y2="446"/>
      <line x1="1110" y1="392" x2="1186" y2="446"/>
      <line x1="1110" y1="392" x2="996"  y2="446"/>
      <line x1="912"  y1="356" x2="996"  y2="446"/>
      <line x1="1168" y1="232" x2="1110" y2="392"/>
      <line x1="996"  y1="446" x2="1066" y2="498"/>
      <line x1="912"  y1="356" x2="840"  y2="276" stroke-opacity="0.5"/>
    </g>

    <!-- faint outbound edges toward (not into) the text column -->
    <g stroke="#6fe9ff" stroke-width="1" stroke-opacity="0.14" stroke-dasharray="3 7">
      <line x1="912" y1="356" x2="772" y2="408"/>
      <line x1="930" y1="178" x2="800" y2="150"/>
    </g>

    <!-- nodes: glow halos -->
    <g>
      <circle cx="1012" cy="300" r="26" fill="url(#nodeGlow)"/>
      <circle cx="1058" cy="150" r="18" fill="url(#nodeGlow)"/>
      <circle cx="1110" cy="392" r="18" fill="url(#nodeGlow)"/>
      <circle cx="1168" cy="232" r="14" fill="url(#nodeGlow)"/>
      <circle cx="996"  cy="446" r="14" fill="url(#nodeGlow)"/>
    </g>
    <!-- nodes: solid cores -->
    <g>
      <circle cx="1012" cy="300" r="6.5" fill="#dffaff"/>
      <circle cx="1058" cy="150" r="5"   fill="#bdefff"/>
      <circle cx="1168" cy="232" r="4.5" fill="#bdefff"/>
      <circle cx="1110" cy="392" r="5"   fill="#bdefff"/>
      <circle cx="912"  cy="356" r="4"   fill="#a9d2ff"/>
      <circle cx="930"  cy="178" r="4"   fill="#a9d2ff"/>
      <circle cx="996"  cy="446" r="4.5" fill="#bdefff"/>
      <circle cx="1186" cy="446" r="3.5" fill="#a9d2ff"/>
      <circle cx="1066" cy="498" r="3.5" fill="#a9d2ff"/>
      <circle cx="840"  cy="276" r="3"   fill="#9fd4ff" fill-opacity="0.8"/>
      <circle cx="772"  cy="408" r="2.5" fill="#9fd4ff" fill-opacity="0.45"/>
      <circle cx="800"  cy="150" r="2.5" fill="#9fd4ff" fill-opacity="0.45"/>
    </g>
  </g>

  <!-- ============ content column (left) ============ -->
  <!-- eyebrow -->
  <circle cx="94.5" cy="160" r="11" fill="url(#dotGlow)"/>
  <circle cx="94.5" cy="160" r="4.5" fill="#6fe9ff"/>
  <text x="113" y="165" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif"
        font-size="14" font-weight="600" letter-spacing="4.2" fill="#80e6f7">KNOWLEDGE-ASSETIZATION OS</text>
  <rect x="462" y="159" width="26" height="1.4" fill="url(#ruleGrad)"/>

  <!-- wordmark -->
  <rect x="350" y="120" width="360" height="230" fill="url(#glowWiki)"/>
  <text x="89" y="268" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Roboto Mono', monospace"
        font-size="98" font-weight="600" letter-spacing="-1.2">
    <tspan fill="url(#agentGrad)">agent</tspan><tspan fill="url(#wikiGrad)">-wiki</tspan>
  </text>

  <!-- taglines -->
  <text x="90" y="332" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif"
        font-size="28" font-weight="500" letter-spacing="-0.14" fill="#d3dcea">A Knowledge-Assetization OS for AI agents</text>
  <text x="90" y="367" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif"
        font-size="18" font-weight="400" letter-spacing="-0.18" fill="#98a5bb">AI 에이전트를 위한 지식 자산화 OS</text>

  <!-- ============ feature chips (row 1: three, row 2: one) ============ -->
  <!-- chip 1 — PDCA · 90-pt gate -->
  <rect x="90" y="398" width="180" height="38" rx="19" fill="url(#chipFill)" stroke="#8cbeff" stroke-opacity="0.16" stroke-width="1"/>
  <g transform="translate(106 409)" fill="none" stroke="#6fe9ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M13.2 5.4A5.5 5.5 0 1 0 13.7 9.7"/>
    <path d="M13.6 2.6V5.6H10.6"/>
  </g>
  <text x="131" y="421" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif"
        font-size="14.5" font-weight="500" fill="#c8d2e2">PDCA <tspan fill="#c8d2e2" fill-opacity="0.42">·</tspan> 90-pt gate</text>

  <!-- chip 2 — self-healing -->
  <rect x="282" y="398" width="134" height="38" rx="19" fill="url(#chipFill)" stroke="#8cbeff" stroke-opacity="0.16" stroke-width="1"/>
  <g transform="translate(298 409)" fill="none" stroke="#6fe9ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1.5 8h3l1.6-4 2.8 8 1.6-4h3.4"/>
  </g>
  <text x="323" y="421" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif"
        font-size="14.5" font-weight="500" fill="#c8d2e2">self-healing</text>

  <!-- chip 3 — single-SOT chokepoint -->
  <rect x="428" y="398" width="202" height="38" rx="19" fill="url(#chipFill)" stroke="#8cbeff" stroke-opacity="0.16" stroke-width="1"/>
  <g transform="translate(444 409)" fill="none" stroke="#6fe9ff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 3.2h3.4L8 7.4l2.6-4.2H14"/>
    <path d="M8 7.4V13"/>
    <circle cx="8" cy="13.4" r="1.5"/>
  </g>
  <text x="469" y="421" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif"
        font-size="14.5" font-weight="500" fill="#c8d2e2">single-SOT chokepoint</text>

  <!-- chip 4 — manufacturing ↔ dev -->
  <rect x="90" y="448" width="198" height="38" rx="19" fill="url(#chipFill)" stroke="#8cbeff" stroke-opacity="0.16" stroke-width="1"/>
  <g transform="translate(106 459)" fill="none" stroke="#6fe9ff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="5" cy="8" r="2.5"/>
    <path d="M5 3.2v1.4M5 11.4v1.4M9.3 8H7.5M2.5 8H.7M7.9 5.1l-1 1M3.1 9.9l-1 1M2.1 5.1l1 1M7.9 10.9l-1-1"/>
    <path d="M11 5l2.4 3L11 11"/>
  </g>
  <text x="131" y="471" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif"
        font-size="14.5" font-weight="500" fill="#c8d2e2">manufacturing <tspan fill="#c8d2e2" fill-opacity="0.42">↔</tspan> dev</text>
</svg>
